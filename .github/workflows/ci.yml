name: Nexus Digital ID CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-assurance:
    name: Quality Assurance
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Linting Checks
        run: |
          flake8 nexus_digital_id tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 nexus_digital_id tests --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Execute Test Suite with Coverage
        run: |
          pytest --cov=nexus_digital_id --cov-report=xml --cov-report=term-missing --cov-fail-under=80 -v

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: quality-assurance

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Package
        run: python -m build

      - name: Verify Package Installation
        run: |
          pip install dist/*.whl
          python -c "from nexus_digital_id import CentralCommand; print('Package import successful')"
